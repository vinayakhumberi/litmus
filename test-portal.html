<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Portal — FAANG Prep</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style type="text/tailwindcss">
  @layer base {
    body { 
      @apply bg-white text-zinc-900 transition-colors duration-200 dark:bg-[#0a0a0a] dark:text-zinc-100;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    body.light-theme { @apply bg-[#fdfcfb]; }
  }
  .sidebar-link.active { @apply bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400 border-l-2 border-blue-600; }
  .code-font { font-family: 'JetBrains Mono', monospace; }
</style>
</head>
<body class="antialiased">

<div class="flex min-h-screen">
  <!-- Sidebar -->
  <aside class="hidden lg:flex w-72 flex-col border-r border-zinc-200 dark:border-zinc-800 sticky top-0 h-screen bg-zinc-50 dark:bg-zinc-950 p-6">
    <a href="index.html" class="text-[10px] font-bold tracking-widest text-zinc-400 hover:text-blue-500 mb-8 block uppercase">← Back to Tracker</a>
    <div id="test-meta" class="mb-8">
        <h2 id="sidebar-topic-name" class="font-bold text-lg leading-tight mb-2">Loading Test...</h2>
        <div class="text-[10px] uppercase tracking-wider text-zinc-500 font-bold" id="sidebar-category">---</div>
    </div>
    
    <div class="text-[10px] uppercase tracking-widest font-extrabold text-zinc-400 mb-4 px-2">Questions</div>
    <nav class="flex-1 overflow-y-auto">
      <ul id="question-nav" class="space-y-1"></ul>
    </nav>

    <div class="mt-auto pt-6 border-t border-zinc-200 dark:border-zinc-800">
        <button id="finish-btn" onclick="completeTest()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-500/20">
            Finish Test
        </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 overflow-y-auto px-6 py-12 lg:px-20 lg:py-20">
    <div id="test-container" class="max-w-3xl mx-auto">
        <!-- Banner Container -->
        <div id="portal-banners" class="mb-8"></div>

        <!-- Questions Area -->
        <div id="questions-list" class="space-y-16"></div>
        
        <!-- Results Section -->
        <div id="results-view" class="hidden space-y-12">
            <header class="text-center mb-16">
                <div class="inline-block px-4 py-1 bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400 rounded-full text-xs font-bold uppercase tracking-widest mb-4">Assessment Results</div>
                <h1 class="text-4xl font-extrabold mb-4">Your Mastery Score</h1>
                <div class="text-6xl font-black text-blue-600" id="final-score">0%</div>
            </header>

            <div class="bg-zinc-100 dark:bg-zinc-900 p-8 rounded-2xl border border-zinc-200 dark:border-zinc-800">
                <h3 class="font-bold text-xl mb-4">Export/Update</h3>
                <p class="text-zinc-500 text-sm mb-6">Download your finalized results to update your main tracker progress.</p>
                <button onclick="exportResults()" class="bg-zinc-900 dark:bg-white dark:text-black text-white px-6 py-3 rounded-lg font-bold text-sm hover:scale-105 transition-transform">
                    Download Result JSON
                </button>
            </div>

            <div id="detailed-feedback" class="space-y-8"></div>
        </div>
    </div>
  </main>
</div>

<script>
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

  const urlParams = new URLSearchParams(window.location.search);
  const topicId = urlParams.get('id');
  let currentTestData = null;
  let userAnswers = {};
  let existingResultFile = null;

  const getStorageKey = () => `test_session_${topicId}`;

  async function loadTest() {
    if (!topicId) return;
    
    // 1. Check for result file on file system (Non-blocking)
    checkExistingResult();

    // 2. Check for ongoing draft in LocalStorage
    const savedSession = JSON.parse(localStorage.getItem(getStorageKey()) || 'null');
    if (savedSession) {
        userAnswers = savedSession.answers || {};
    }

    // 3. Attempt to load the test JSON
    const paths = [`data/tests/${topicId}.json`, `data/tests/${topicId}-test.json` ];
    let loaded = false;

    for (const path of paths) {
      try {
        const res = await fetch(path);
        if (res.ok) {
          currentTestData = await res.json();
          renderTest();
          loaded = true;
          break;
        }
      } catch (err) {}
    }

    // 4. Handle Failure: Show the 'Not Found' UI immediately
    if (!loaded) {
        showNotFoundUI();
    }
  }

  function showNotFoundUI() {
    document.getElementById('test-container').innerHTML = `
      <div class="text-center py-20 px-6">
          <div class="text-6xl mb-8 animate-bounce">📝</div>
          <h1 class="text-3xl font-black mb-4 tracking-tight">Test Module Missing</h1>
          <p class="text-zinc-500 mb-10 max-w-md mx-auto leading-relaxed">
            The assessment JSON for <span class="text-zinc-900 dark:text-zinc-100 font-bold underline decoration-blue-500/30">${topicId}</span> hasn't been generated yet.
          </p>
          
          <div class="bg-zinc-100 dark:bg-zinc-900/50 p-6 rounded-2xl text-left mb-10 max-w-md mx-auto border border-zinc-200 dark:border-zinc-800 shadow-inner">
            <p class="text-[10px] font-bold uppercase tracking-widest mb-3 text-zinc-400">Next Steps:</p>
            <ol class="text-xs space-y-3 text-zinc-600 dark:text-zinc-400">
                <li class="flex gap-2"><span>1.</span> <span>Go to the <b>Tracker</b> and click the 🧪 icon.</span></li>
                <li class="flex gap-2"><span>2.</span> <span>Paste the prompt into Claude and save the output.</span></li>
                <li class="flex gap-2"><span>3.</span> <span>Save as: <code class="text-blue-500 font-bold">data/tests/${topicId}.json</code></span></li>
            </ol>
          </div>

          <a href="index.html" class="inline-flex items-center gap-2 bg-zinc-900 dark:bg-white dark:text-black text-white px-8 py-4 rounded-2xl font-bold hover:scale-105 transition-all shadow-xl shadow-blue-500/10">
            <span>←</span> Back to Tracker
          </a>
      </div>
    `;
  }

  async function checkExistingResult() {
    const resultPaths = [`data/results/${topicId}.json`, `data/results/${topicId}-result.json` ];
    for (const path of resultPaths) {
      try {
        const res = await fetch(path);
        if (res.ok) {
          existingResultFile = await res.json();
          showPreviousResultBanner();
          return;
        }
      } catch (e) {}
    }
  }

  function showPreviousResultBanner() {
    const banner = document.createElement('div');
    banner.className = "bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 p-4 rounded-xl flex justify-between items-center";
    banner.innerHTML = `
        <div class="flex items-center gap-3">
            <span class="text-xl">📊</span>
            <div>
                <div class="text-sm font-bold text-blue-900 dark:text-blue-100">Previous result found</div>
                <div class="text-xs text-blue-700 dark:text-blue-300">Score: ${existingResultFile.result.score}% from ${existingResultFile.result.testDate}</div>
            </div>
        </div>
        <button onclick="loadPreviousResult()" class="text-xs font-bold uppercase tracking-widest text-blue-600 dark:text-blue-400 hover:underline">
            View Analysis
        </button>
    `;
    document.getElementById('portal-banners').appendChild(banner);
  }

  function loadPreviousResult() {
    if (!existingResultFile) return;
    const res = existingResultFile.result;
    
    // Create detailed items for renderResults
    const mockResults = [];
    const questions = currentTestData.test.questions;
    
    questions.forEach(q => {
        const userAns = res.answers[q.id] || "";
        let pointsEarned = 0;
        if (q.type === 'multiple-choice') {
            const userLetter = userAns.trim().charAt(0).toUpperCase();
            const correctLetter = q.correctAnswer.trim().charAt(0).toUpperCase();
            pointsEarned = userLetter === correctLetter ? q.points : 0;
        } else {
            pointsEarned = userAns.length > 50 ? q.points : q.points / 2;
        }
        mockResults.push({
            id: q.id, type: q.type, question: q.question || q.scenario,
            userAnswer: userAns, correctAnswer: q.correctAnswer || q.sampleAnswer,
            explanation: q.explanation, pointsEarned, pointsPossible: q.points
        });
    });

    renderResults(res.score, mockResults, true);
  }

  function renderTest() {
    const test = currentTestData.test;
    document.getElementById('sidebar-topic-name').textContent = test.topicName;
    document.getElementById('sidebar-category').textContent = test.category || 'Assessment';
    
    const list = document.getElementById('questions-list');
    const nav = document.getElementById('question-nav');
    list.innerHTML = '';
    nav.innerHTML = '';
    
    test.questions.forEach((q, i) => {
      const hasAnswer = userAnswers[q.id] !== undefined;
      const navLi = document.createElement('li');
      navLi.innerHTML = `<a href="#q-${q.id}" id="nav-q-${q.id}" class="sidebar-link block px-4 py-2 text-sm ${hasAnswer ? 'text-blue-500 font-bold' : 'text-zinc-500'} hover:text-zinc-900 dark:hover:text-white transition-all rounded-lg">Question ${i+1}</a>`;
      nav.appendChild(navLi);

      const qDiv = document.createElement('div');
      qDiv.id = `q-${q.id}`;
      qDiv.className = "question-card bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-8 shadow-sm scroll-mt-24 mb-16";
      
      let inputHtml = '';
      if (q.type === 'multiple-choice') {
        inputHtml = `<div class="space-y-3 mt-6">
            ${q.options.map(opt => {
              const checked = userAnswers[q.id] === opt[0];
              return `<label class="flex items-center gap-4 p-4 border ${checked ? 'border-blue-500 bg-blue-50/50' : 'border-zinc-100 dark:border-zinc-800'} rounded-xl cursor-pointer hover:bg-zinc-50 dark:hover:bg-zinc-800/50 transition-all">
                <input type="radio" name="q-${q.id}" value="${opt[0]}" ${checked ? 'checked' : ''} onchange="recordAnswer(${q.id}, '${opt[0]}')" class="w-4 h-4 accent-blue-600">
                <span class="text-sm font-medium">${opt}</span>
              </label>`;
            }).join('')}
          </div>`;
      } else {
        inputHtml = `<div class="mt-6">
            ${q.code ? `<pre class="bg-zinc-950 text-zinc-300 p-4 rounded-lg mb-4 text-xs code-font overflow-x-auto"><code>${q.code}</code></pre>` : ''}
            <textarea oninput="recordAnswer(${q.id}, this.value)" class="w-full bg-zinc-50 dark:bg-zinc-950 border border-zinc-200 dark:border-zinc-800 rounded-xl p-4 h-48 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">${userAnswers[q.id] || ''}</textarea>
          </div>`;
      }

      qDiv.innerHTML = `<h3 class="text-xl font-bold leading-tight">${q.question || q.scenario}</h3>${inputHtml}`;
      list.appendChild(qDiv);
    });
  }

  function recordAnswer(qId, val) {
    userAnswers[qId] = val;
    document.getElementById(`nav-q-${qId}`).classList.add('text-blue-500', 'font-bold');
    localStorage.setItem(getStorageKey(), JSON.stringify({ answers: userAnswers }));
  }

  function completeTest() {
    const test = currentTestData.test;
    let totalPossible = 0; let totalEarned = 0;
    const resultData = [];

    test.questions.forEach(q => {
      totalPossible += q.points;
      const userAns = userAnswers[q.id] || "";
      let pointsEarned = 0;

      if (q.type === 'multiple-choice') {
        const userLetter = userAns.trim().charAt(0).toUpperCase();
        const correctLetter = q.correctAnswer.trim().charAt(0).toUpperCase();
        pointsEarned = userLetter === correctLetter ? q.points : 0;
      } else {
        pointsEarned = userAns.length > 50 ? q.points : q.points / 2;
      }
      
      totalEarned += pointsEarned;
      resultData.push({
        id: q.id, type: q.type, question: q.question || q.scenario,
        userAnswer: userAns, correctAnswer: q.correctAnswer || q.sampleAnswer,
        explanation: q.explanation, pointsEarned, pointsPossible: q.points
      });
    });

    const scorePercent = Math.round((totalEarned / totalPossible) * 100);
    renderResults(scorePercent, resultData);
  }

  function renderResults(score, results, fromFile = false) {
    document.getElementById('questions-list').classList.add('hidden');
    document.getElementById('portal-banners').classList.add('hidden');
    document.getElementById('finish-btn').classList.add('hidden');
    const view = document.getElementById('results-view');
    view.classList.remove('hidden');
    document.getElementById('final-score').textContent = `${score}%`;
    
    const feedbackContainer = document.getElementById('detailed-feedback');
    feedbackContainer.innerHTML = `<div class="flex justify-between items-center border-b border-zinc-200 dark:border-zinc-800 pb-4 mb-8">
        <h2 class="text-2xl font-bold">Review Mode ${fromFile ? '(Saved File)' : '(New Attempt)'}</h2>
        <button onclick="location.reload()" class="text-xs font-bold text-blue-500 hover:underline">Return to Test</button>
    </div>`;

    results.forEach(res => {
        const card = document.createElement('div');
        card.className = "border border-zinc-200 dark:border-zinc-800 rounded-2xl overflow-hidden mb-8";
        card.innerHTML = `<div class="p-6 bg-zinc-50 dark:bg-zinc-900/50 border-b border-zinc-200 dark:border-zinc-800">
            <h4 class="font-bold">${res.question}</h4>
        </div>
        <div class="p-6 grid grid-cols-1 md:grid-cols-2 gap-8 text-sm">
            <div><span class="text-[10px] uppercase font-bold text-zinc-400 mb-2 block">Your Answer</span><div class="opacity-80 italic">${res.userAnswer || "None"}</div></div>
            <div><span class="text-[10px] uppercase font-bold text-blue-500 mb-2 block">Reference</span><div>${res.correctAnswer}</div></div>
        </div>`;
        feedbackContainer.appendChild(card);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function exportResults() {
    const test = currentTestData.test;
    const finalScore = parseInt(document.getElementById('final-score').textContent);
    const exportData = {
      result: { topicId, topicName: test.topicName, score: finalScore, testDate: new Date().toISOString().split('T')[0], passed: finalScore >= 70, answers: userAnswers }
    };
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `${topicId}.json`;
    a.click();
  }

  loadTest();
</script>
</body>
</html>
