<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>External Resources — FAANG Prep</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style type="text/tailwindcss">
  @layer base {
    body { 
      @apply bg-zinc-50 text-zinc-900 transition-colors duration-200 dark:bg-[#0a0a0a] dark:text-zinc-100;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    body.light-theme { @apply bg-[#fdfcfb]; }
  }
</style>
</head>
<body class="antialiased">

<div class="max-w-4xl mx-auto px-6 py-12 lg:py-20">
  <header class="mb-12 flex justify-between items-end border-b border-zinc-200 dark:border-zinc-800 pb-8">
    <div>
        <a href="index.html" class="text-[10px] font-bold tracking-widest text-zinc-400 hover:text-blue-500 mb-4 block uppercase">← Back to Tracker</a>
        <h1 class="text-4xl font-extrabold tracking-tight">Study Resources</h1>
        <p class="text-zinc-500 mt-2">Extra documents, reference guides, and cheat sheets.</p>
    </div>
    <div id="file-count" class="text-xs font-mono text-zinc-500 bg-zinc-100 dark:bg-zinc-900 px-3 py-1 rounded-full border border-zinc-200 dark:border-zinc-800">
        Scanning...
    </div>
  </header>

  <div class="mb-8">
    <input type="text" id="search" oninput="filterResources()" placeholder="Search resources..." class="w-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-xl px-5 py-3 outline-none focus:ring-2 focus:ring-blue-500/20 transition-all">
  </div>

  <div id="resources-grid" class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <!-- Resources injected here -->
  </div>

  <div id="empty-state" class="hidden py-20 text-center">
    <div class="text-4xl mb-4">📂</div>
    <h3 class="text-lg font-bold">No resources found</h3>
    <p class="text-zinc-500 text-sm">Add HTML files to the <code>/resources</code> folder to see them here.</p>
  </div>
</div>

<script>
  if (localStorage.getItem('theme') === 'light') document.body.classList.add('light-theme');

  let allFiles = [];

  async function scanResources() {
    const grid = document.getElementById('resources-grid');
    const empty = document.getElementById('empty-state');
    
    try {
      // 1. Fetch the /resources directory
      const response = await fetch('./resources/');
      if (!response.ok) throw new Error("Could not read directory");

      const html = await response.text();
      
      // 2. Parse the "Index of" page generated by the local server
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const links = Array.from(doc.querySelectorAll('a'));

      // 3. Filter for HTML files
      allFiles = links
        .map(link => link.getAttribute('href'))
        .filter(href => href && href.endsWith('.html'))
        .map(href => ({
            name: decodeURIComponent(href).replace('.html', '').replace(/-/g, ' ').replace(/_/g, ' '),
            filename: href,
            path: `resources/${href}`
        }));

      renderFiles(allFiles);
    } catch (err) {
      console.warn("Manual directory listing failed (likely server config). Using fallback placeholder.");
      grid.classList.add('hidden');
      empty.classList.remove('hidden');
    }
  }

  function renderFiles(files) {
    const grid = document.getElementById('resources-grid');
    const empty = document.getElementById('empty-state');
    const counter = document.getElementById('file-count');

    if (files.length === 0) {
        grid.innerHTML = '';
        empty.classList.remove('hidden');
        counter.textContent = "0 Files";
        return;
    }

    empty.classList.add('hidden');
    counter.textContent = `${files.length} Resources Found`;
    
    grid.innerHTML = files.map(file => `
        <a href="${file.path}" target="_blank" class="group bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 p-6 rounded-2xl hover:border-blue-500/50 hover:shadow-lg hover:shadow-blue-500/5 transition-all">
            <div class="flex justify-between items-start mb-4">
                <span class="text-2xl group-hover:scale-110 transition-transform">📄</span>
                <span class="text-[9px] font-mono text-zinc-400 border border-zinc-200 dark:border-zinc-800 px-2 py-0.5 rounded">HTML</span>
            </div>
            <h3 class="font-bold text-zinc-900 dark:text-zinc-100 group-hover:text-blue-500 transition-colors capitalize">${file.name}</h3>
            <p class="text-xs text-zinc-500 mt-1 font-mono opacity-60">${file.filename}</p>
        </a>
    `).join('');
  }

  function filterResources() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = allFiles.filter(f => f.name.toLowerCase().includes(q) || f.filename.toLowerCase().includes(q));
    renderFiles(filtered);
  }

  scanResources();
</script>
</body>
</html>
